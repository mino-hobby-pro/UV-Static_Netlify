<!DOCTYPE html>
<html>
<head>
  <script async src="https://arc.io/widget.min.js#L1SfLEWE "></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VHVNHMYGN3 "></script>
  <script src="http://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js "></script>
  <link rel="stylesheet" href="./particles.css">
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VHVNHMYGN3');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://code.jquery.com/jquery-1.10.2.js "></script>
  <link rel="stylesheet" href="index.css">
  <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>

  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bio:      #00e5cc;
      --bio-dim:  #006e64;
      --abyss:    #000408;
      --deep:     #00080f;
      --steel:    rgba(20,55,75,0.7);
      --glow-sm:  0 0 8px var(--bio), 0 0 20px rgba(0,229,204,.3);
      --glow-lg:  0 0 16px var(--bio), 0 0 50px rgba(0,229,204,.4), 0 0 120px rgba(0,200,180,.2);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--abyss);
      cursor: crosshair;
    }

    /* ──────────────────────────────────────────
       Three.js canvas – absolute back
    ────────────────────────────────────────── */
    #abyss-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    /* particles-js preserved but invisible */
    #particles-js {
      position: fixed; inset: 0;
      z-index: -1; opacity: 0;
      pointer-events: none;
    }

    /* ──────────────────────────────────────────
       Porthole vignette overlay
    ────────────────────────────────────────── */
    #porthole-vignette {
      position: fixed; inset: 0;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(
        ellipse 54% 54% at 50% 50%,
        transparent 38%,
        rgba(0,4,14,.28) 56%,
        rgba(0,2,10,.72) 72%,
        rgba(0,0,6,.93) 86%,
        #000 100%
      );
    }

    /* Porthole metal rim */
    #porthole-rim {
      position: fixed;
      width:  min(87vw, 87vh);
      height: min(87vw, 87vh);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 4;
      pointer-events: none;
      border: 7px solid rgba(25,60,80,.72);
      box-shadow:
        0 0 0 2px  rgba(0,200,180,.06),
        0 0 0 14px rgba(8,28,42,.88),
        0 0 0 16px rgba(0,160,145,.05),
        0 0 55px   rgba(0,90,130,.50),
        inset 0 0 55px rgba(0,10,25,.60);
      animation: rimPulse 9s ease-in-out infinite;
    }
    @keyframes rimPulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(0,200,180,.06),0 0 0 14px rgba(8,28,42,.88),0 0 0 16px rgba(0,160,145,.05),0 0 55px rgba(0,90,130,.50),inset 0 0 55px rgba(0,10,25,.60); }
      50%      { box-shadow: 0 0 0 2px rgba(0,220,200,.12),0 0 0 14px rgba(8,28,42,.88),0 0 0 16px rgba(0,200,185,.09),0 0 80px rgba(0,120,160,.60),inset 0 0 55px rgba(0,10,25,.60); }
    }

    /* Subtle scanlines */
    #scanlines {
      position: fixed; inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px
      );
    }

    /* ──────────────────────────────────────────
       HUD corners
    ────────────────────────────────────────── */
    .hud {
      position: fixed;
      z-index: 6;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(0,200,160,.48);
      letter-spacing: .18em;
      pointer-events: none;
      line-height: 1.8;
      animation: hudIn 5s ease forwards;
    }
    @keyframes hudIn {
      0%   { opacity: 0; }
      60%  { opacity: 0; }
      100% { opacity: 1; }
    }
    #hud-tl { top: 28px; left: 38px; }
    #hud-tr { top: 28px; right: 38px; text-align: right; }
    #hud-bl { bottom: 32px; left: 38px; }
    #hud-br { bottom: 32px; right: 38px; text-align: right; }

    .hud-accent { color: rgba(0,229,204,.8); }

    /* Pressure flicker on CRITICAL line */
    .flicker {
      animation: flickerLoop 14s linear infinite;
    }
    @keyframes flickerLoop {
      0%,93%,100% { opacity: 1; }
      94% { opacity: .2; }
      95% { opacity: 1; }
      97% { opacity: .15; }
      98% { opacity: .9; }
    }

    /* ──────────────────────────────────────────
       Mini sonar
    ────────────────────────────────────────── */
    #sonar-wrap {
      position: fixed;
      bottom: 38px; left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      pointer-events: none;
      width: 72px; height: 72px;
      animation: hudIn 5s ease forwards;
    }
    #sonar-wrap svg { width: 100%; height: 100%; overflow: visible; }

    /* ──────────────────────────────────────────
       Main UI panel
    ────────────────────────────────────────── */
    #imgsearch {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: min(540px, 86vw);
      text-align: center;
      animation: diveIn 3.2s cubic-bezier(.16,.04,.02,1) forwards;
    }
    @keyframes diveIn {
      0%   { opacity: 0; transform: translate(-50%, -44%); filter: blur(10px); }
      100% { opacity: 1; transform: translate(-50%, -50%); filter: blur(0);    }
    }

    #imgsearch title { display: none; }

    #imgsearch h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.4rem, 5.5vw, 3.8rem);
      font-weight: 900;
      letter-spacing: .28em;
      color: var(--bio);
      text-shadow: var(--glow-lg);
      margin-bottom: 4px;
      animation: titlePulse 5s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { text-shadow: var(--glow-lg); }
      50%      { text-shadow: 0 0 22px var(--bio),0 0 60px rgba(0,229,204,.65),0 0 140px rgba(0,200,180,.3); }
    }

    .sub-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: rgba(0,180,160,.38);
      letter-spacing: .55em;
      text-transform: uppercase;
      margin-bottom: 34px;
    }

    /* Form panel */
    #uv-form {
      position: relative;
      background: rgba(0,8,18,.58);
      border: 1px solid rgba(0,180,160,.2);
      border-radius: 3px;
      padding: 22px 22px 16px;
      backdrop-filter: blur(14px);
      box-shadow:
        0 0 0 1px rgba(0,229,204,.04),
        0 22px 70px rgba(0,0,0,.85),
        inset 0 1px 0 rgba(0,180,160,.09);
    }
    /* Corner brackets */
    #uv-form::before, #uv-form::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: rgba(0,200,180,.45);
      border-style: solid;
    }
    #uv-form::before { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
    #uv-form::after  { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* Input */
    #uv-address {
      width: 100%;
      background: rgba(0,18,32,.82);
      border: 1px solid rgba(0,180,160,.28);
      border-radius: 2px;
      padding: 13px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: rgba(0,230,200,.92);
      letter-spacing: .06em;
      outline: none;
      caret-color: var(--bio);
      transition: border-color .3s, box-shadow .3s, background .3s;
    }
    #uv-address::placeholder { color: rgba(0,150,130,.38); letter-spacing: .12em; }
    #uv-address:focus {
      border-color: rgba(0,229,204,.55);
      background: rgba(0,24,40,.9);
      box-shadow: 0 0 0 1px rgba(0,229,204,.08), 0 0 24px rgba(0,180,160,.14), inset 0 0 18px rgba(0,100,90,.1);
    }

    /* Error */
    .desc { margin-top: 7px; }
    #uv-error      { font-family:'Share Tech Mono',monospace; font-size:11px; color:rgba(255,80,80,.68); letter-spacing:.1em; }
    #uv-error-code { font-family:'Share Tech Mono',monospace; font-size:9px;  color:rgba(0,150,130,.4); }

    /* Depth bar */
    #depth-row {
      margin-top: 14px;
      display: flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: rgba(0,180,160,.32);
      letter-spacing: .18em;
    }
    #depth-bar {
      flex: 1; height: 2px;
      background: rgba(0,180,160,.1);
      border-radius: 1px; overflow: hidden;
    }
    #depth-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, transparent, var(--bio-dim), var(--bio));
      transition: width .08s linear;
      box-shadow: 0 0 6px var(--bio);
    }
    #depth-val { white-space: nowrap; min-width: 62px; text-align: right; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     DEEP SEA — Three.js submarine POV
═══════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  // ── Renderer ────────────────────────────────────────────
  var canvas   = document.getElementById('abyss-canvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000408, 1);

  // ── Scene & Camera ──────────────────────────────────────
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000408);
  scene.fog = new THREE.FogExp2(0x000a18, 0.016);

  var camera = new THREE.PerspectiveCamera(
    76, window.innerWidth / window.innerHeight, 0.1, 400
  );
  camera.position.set(0, 0, 0);

  // ── Lights ──────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x001a30, 2.0));

  var lightColors = [0x00e5cc, 0x0077ff, 0x00ff88, 0x2200cc];
  var floatingLights = [];
  for (var li = 0; li < 5; li++) {
    var pl = new THREE.PointLight(lightColors[li % 4], 4, 50);
    pl.position.set(
      (Math.random() - 0.5) * 24,
      (Math.random() - 0.5) * 12,
      -25 - li * 20
    );
    scene.add(pl);
    floatingLights.push({ light: pl, ph: Math.random() * Math.PI * 2 });
  }

  // ── Marine snow / bioluminescent plankton ────────────────
  var N_SNOW = 6000;
  var SX = 90, SY = 45, SZ = 250;

  var snowPos   = new Float32Array(N_SNOW * 3);
  var snowCol   = new Float32Array(N_SNOW * 3);
  var snowAlpha = new Float32Array(N_SNOW);

  for (var i = 0; i < N_SNOW; i++) {
    snowPos[i*3]   = (Math.random()-0.5)*SX;
    snowPos[i*3+1] = (Math.random()-0.5)*SY;
    snowPos[i*3+2] = -Math.random()*SZ;

    var r = Math.random();
    if      (r < 0.40) { snowCol[i*3]=0.00; snowCol[i*3+1]=0.72+Math.random()*.28; snowCol[i*3+2]=0.85+Math.random()*.15; }
    else if (r < 0.65) { snowCol[i*3]=0.00; snowCol[i*3+1]=0.30+Math.random()*.30; snowCol[i*3+2]=1.00; }
    else if (r < 0.84) { snowCol[i*3]=0.00; snowCol[i*3+1]=1.00; snowCol[i*3+2]=0.40+Math.random()*.40; }
    else               { snowCol[i*3]=0.60+Math.random()*.40; snowCol[i*3+1]=0.85; snowCol[i*3+2]=1.00; }

    snowAlpha[i] = 0.5 + Math.random() * 0.5;
  }

  var snowGeo = new THREE.BufferGeometry();
  snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
  snowGeo.setAttribute('color',    new THREE.BufferAttribute(snowCol, 3));

  var snowMat = new THREE.PointsMaterial({
    size: 0.22,
    vertexColors: true,
    transparent: true,
    opacity: 0.88,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });

  var snow = new THREE.Points(snowGeo, snowMat);
  scene.add(snow);

  // ── Larger bioluminescent orbs ───────────────────────────
  var N_ORBS = 120;
  var orbPos = new Float32Array(N_ORBS * 3);
  var orbCol = new Float32Array(N_ORBS * 3);
  for (var j = 0; j < N_ORBS; j++) {
    orbPos[j*3]   = (Math.random()-0.5)*80;
    orbPos[j*3+1] = (Math.random()-0.5)*35;
    orbPos[j*3+2] = -5 - Math.random()*SZ;
    var rc = Math.random();
    if (rc < 0.5) { orbCol[j*3]=0; orbCol[j*3+1]=0.9; orbCol[j*3+2]=1; }
    else          { orbCol[j*3]=0; orbCol[j*3+1]=1;   orbCol[j*3+2]=0.5; }
  }
  var orbGeo = new THREE.BufferGeometry();
  orbGeo.setAttribute('position', new THREE.BufferAttribute(orbPos, 3));
  orbGeo.setAttribute('color',    new THREE.BufferAttribute(orbCol, 3));
  var orbMat = new THREE.PointsMaterial({
    size: 0.9,
    vertexColors: true,
    transparent: true,
    opacity: 0.60,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });
  scene.add(new THREE.Points(orbGeo, orbMat));

  // ── Jellyfish factory ────────────────────────────────────
  function makeJellyfish(scale) {
    var g = new THREE.Group();

    // Outer bell
    var bGeo = new THREE.SphereGeometry(1.3*scale,16,10,0,Math.PI*2,0,Math.PI*.58);
    var bMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(0, 0.88, 1),
      transparent:true, opacity:0.10,
      side:THREE.DoubleSide,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    g.add(new THREE.Mesh(bGeo, bMat));

    // Inner core
    var cGeo = new THREE.SphereGeometry(0.72*scale,12,8,0,Math.PI*2,0,Math.PI*.55);
    var cMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(0.05,1,0.88),
      transparent:true, opacity:0.18,
      side:THREE.DoubleSide,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    g.add(new THREE.Mesh(cGeo, cMat));

    // Rim ring
    var rGeo = new THREE.TorusGeometry(1.3*scale,0.055*scale,8,36);
    rGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI/2));
    var rMat = new THREE.MeshBasicMaterial({
      color:0x00ffcc, transparent:true, opacity:0.72,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    g.add(new THREE.Mesh(rGeo, rMat));

    // Tentacles
    var nT = 6 + Math.floor(Math.random()*7);
    for (var t = 0; t < nT; t++) {
      var ang = (t/nT)*Math.PI*2;
      var r0  = 0.65*scale;
      var len = (2.5+Math.random()*5)*scale;
      var pts = [];
      for (var s = 0; s <= 14; s++) {
        var frac = s/14;
        pts.push(new THREE.Vector3(
          Math.cos(ang)*r0 + Math.sin(frac*4+ang)*0.28*scale,
          -frac*len,
          Math.sin(ang)*r0 + Math.cos(frac*4+ang)*0.28*scale
        ));
      }
      var tGeo = new THREE.BufferGeometry().setFromPoints(pts);
      var tMat = new THREE.LineBasicMaterial({
        color:0x00ddff, transparent:true,
        opacity:0.22+Math.random()*.22,
        blending:THREE.AdditiveBlending
      });
      g.add(new THREE.Line(tGeo,tMat));
    }
    return g;
  }

  var jellies = [];
  for (var ji = 0; ji < 22; ji++) {
    var jelly = makeJellyfish(0.55 + Math.random()*1.25);
    jelly.position.set(
      (Math.random()-0.5)*70,
      (Math.random()-0.5)*28,
      -12 - Math.random()*200
    );
    jelly.rotation.y = Math.random()*Math.PI*2;
    scene.add(jelly);
    jellies.push({
      m: jelly,
      baseY: jelly.position.y,
      spd: 0.25+Math.random()*.6,
      ph:  Math.random()*Math.PI*2
    });
  }

  // ── God rays / light shafts ──────────────────────────────
  for (var ri = 0; ri < 8; ri++) {
    var H = 80 + Math.random()*40;
    var rGeo2 = new THREE.ConeGeometry(1.8+Math.random()*3, H, 5, 1, true);
    var rMat2 = new THREE.MeshBasicMaterial({
      color:0x003850,
      transparent:true, opacity:0.022+Math.random()*.025,
      side:THREE.FrontSide,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    var cone = new THREE.Mesh(rGeo2, rMat2);
    cone.position.set(
      (Math.random()-0.5)*50,
      28+Math.random()*22,
      -15 - Math.random()*120
    );
    cone.rotation.z = (Math.random()-0.5)*0.45;
    cone.rotation.x = Math.random()*0.25;
    scene.add(cone);
  }

  // ── Distant seafloor silhouettes ─────────────────────────
  for (var bi = 0; bi < 40; bi++) {
    var br = 1.5 + Math.random()*9;
    var bGeo2 = new THREE.SphereGeometry(br,7,5);
    var bMat2 = new THREE.MeshBasicMaterial({ color:0x000810 });
    var boulder = new THREE.Mesh(bGeo2, bMat2);
    boulder.position.set(
      (Math.random()-0.5)*90,
      -14 - Math.random()*12,
      -40 - Math.random()*220
    );
    boulder.scale.y = 0.25+Math.random()*.35;
    scene.add(boulder);
  }

  // ── Mouse parallax ───────────────────────────────────────
  var mx = 0, my = 0;
  document.addEventListener('mousemove', function(e) {
    mx = (e.clientX/window.innerWidth  - 0.5)*2;
    my = (e.clientY/window.innerHeight - 0.5)*2;
  });
  var lookX = 0, lookY = 0;

  // ── HUD & Sonar DOM refs ─────────────────────────────────
  var elDepth   = document.getElementById('hud-depth-val');
  var elPress   = document.getElementById('hud-press');
  var elClock   = document.getElementById('hud-clock');
  var elDFill   = document.getElementById('depth-fill');
  var elDVal    = document.getElementById('depth-val');
  var elSweep   = document.getElementById('sonar-sweep');
  var elTrail   = document.getElementById('sonar-trail');

  var sonarAngle = 0;
  var sonarCX = 36, sonarCY = 36, sonarR = 33;

  function updateSonar() {
    sonarAngle += 0.025;
    var ex = sonarCX + Math.cos(sonarAngle)*sonarR;
    var ey = sonarCY + Math.sin(sonarAngle)*sonarR;
    if (elSweep) {
      elSweep.setAttribute('x2', ex.toFixed(1));
      elSweep.setAttribute('y2', ey.toFixed(1));
    }
    // Fan trail (last 40° behind sweep)
    if (elTrail) {
      var a0 = sonarAngle - 0.70;
      var large = 0;
      var x0 = sonarCX + Math.cos(a0)*sonarR;
      var y0 = sonarCY + Math.sin(a0)*sonarR;
      elTrail.setAttribute('d',
        'M '+sonarCX+' '+sonarCY+
        ' L '+x0.toFixed(1)+' '+y0.toFixed(1)+
        ' A '+sonarR+' '+sonarR+' 0 '+large+' 1 '+
        ex.toFixed(1)+' '+ey.toFixed(1)+' Z'
      );
    }
  }

  // ── Main animation loop ──────────────────────────────────
  var time = 0;
  var depth = 847;
  var CAM_SPEED = 0.038;
  var frame = 0;

  function recycle(pos, i, camZ) {
    if (pos[i*3+2] - camZ > 3) {
      pos[i*3]   = (Math.random()-0.5)*SX;
      pos[i*3+1] = (Math.random()-0.5)*SY;
      pos[i*3+2] = camZ - SZ + Math.random()*10;
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    time  += 0.016;
    frame += 1;

    // Camera forward drift
    camera.position.z -= CAM_SPEED;

    // Smooth mouse look
    lookX += (-my * 0.025 - lookX) * 0.04;
    lookY += (-mx * 0.025 - lookY) * 0.04;

    // Submarine sway (compound sine)
    camera.rotation.z = Math.sin(time*0.28)*0.008 + Math.sin(time*0.11)*0.004;
    camera.rotation.x = lookX + Math.sin(time*0.19)*0.005;
    camera.rotation.y = lookY + Math.sin(time*0.13)*0.006;

    // Marine snow — slow sink + recycle
    var sp = snowGeo.attributes.position.array;
    var camZ = camera.position.z;
    for (var k = 0; k < N_SNOW; k++) {
      sp[k*3+1] -= 0.004;
      recycle(sp, k, camZ);
    }
    snowGeo.attributes.position.needsUpdate = true;

    // Jellyfish bob & pulse
    for (var jk = 0; jk < jellies.length; jk++) {
      var jd = jellies[jk];
      jd.m.position.y = jd.baseY + Math.sin(time*jd.spd + jd.ph)*1.8;
      jd.m.rotation.y += 0.004;
      // Pulse opacity on bell & core
      var pulse = Math.sin(time*jd.spd*2 + jd.ph);
      if (jd.m.children[0]) jd.m.children[0].material.opacity = 0.07 + pulse*0.035;
      if (jd.m.children[1]) jd.m.children[1].material.opacity = 0.14 + pulse*0.06;
      // Recycle
      if (jd.m.position.z - camZ > 5) {
        jd.m.position.z = camZ - 180 - Math.random()*40;
        jd.m.position.x = (Math.random()-0.5)*70;
        jd.baseY = (Math.random()-0.5)*28;
      }
    }

    // Floating lights drift
    for (var lk = 0; lk < floatingLights.length; lk++) {
      var ld = floatingLights[lk];
      ld.light.position.x = Math.sin(time*0.25 + ld.ph)*18;
      ld.light.position.y = Math.cos(time*0.18 + ld.ph)*7;
      if (ld.light.position.z - camZ > 5) {
        ld.light.position.z = camZ - 80 - Math.random()*40;
      }
    }

    // ── HUD updates (every 4 frames) ──
    if (frame % 4 === 0) {
      depth += 0.06 + Math.random()*0.04;
      var depthM   = Math.floor(depth);
      var pressAtm = (depthM/10).toFixed(0);
      var fillPct  = (depth % 5000) / 5000 * 100;
      if (elDepth) elDepth.textContent = depthM.toLocaleString() + ' m';
      if (elPress) elPress.textContent = pressAtm;
      if (elDFill) elDFill.style.width  = fillPct.toFixed(1) + '%';
      if (elDVal)  elDVal.textContent   = depthM.toLocaleString() + ' m';

      var now = new Date();
      var ts  = now.toTimeString().slice(0,8);
      if (elClock) elClock.textContent = ts;

      updateSonar();
    }

    renderer.render(scene, camera);
  }

  animate();

  // ── Resize ────────────────────────────────────────────────
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

})();
</script>

</body>
</html>
