<html>

      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js "></script>
      <link rel="stylesheet" href="index.css">
      <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>
      
      <style>
        /* === ABYSS V5 - DEEP CORE THEME === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
          width: 100%;
          height: 100%;
          overflow: hidden;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
          background: #000;
        }
        
        /* Deep Abyss Background Layer */
        #particles-js {
          position: fixed !important;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0;
          background: radial-gradient(ellipse at bottom, #0b1d2e 0%, #000000 60%, #050510 100%);
        }
        
        /* Vignette - Deep darkness at edges */
        body::before {
          content: "";
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.8) 100%);
          pointer-events: none;
          z-index: 2;
        }
        
        /* Scanlines - Abyss depth feel */
        body::after {
          content: "";
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px);
          background-size: 100% 3px;
          pointer-events: none;
          z-index: 3;
          opacity: 0.4;
          animation: scanlineMove 10s linear infinite;
        }
        
        @keyframes scanlineMove {
          0% { background-position: 0 0; }
          100% { background-position: 0 100%; }
        }
        
        /* Main Search Container */
        #imgsearch {
          position: relative;
          z-index: 10;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          width: 100%;
          padding: 20px;
        }
        
        /* Abyss Title */
        h1 {
          font-size: clamp(2.5rem, 8vw, 5rem);
          font-weight: 100;
          letter-spacing: 0.6em;
          text-transform: uppercase;
          color: transparent;
          background: linear-gradient(180deg, #e0f7fa 0%, #00d2ff 40%, #3a7bd5 100%);
          -webkit-background-clip: text;
          background-clip: text;
          filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.3));
          margin-bottom: 60px;
          text-align: center;
          animation: abyssFloat 7s ease-in-out infinite, abyssPulse 4s ease-in-out infinite alternate;
        }
        
        @keyframes abyssFloat {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-20px); }
        }
        
        @keyframes abyssPulse {
          0% { filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.3)); }
          100% { filter: drop-shadow(0 0 50px rgba(0, 210, 255, 0.6)) drop-shadow(0 0 100px rgba(58, 123, 213, 0.2)); }
        }
        
        /* Search Form */
        #uv-form {
          width: 100%;
          max-width: 650px;
          display: flex;
          justify-content: center;
          animation: formRise 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
          opacity: 0;
          transform: translateY(40px);
        }
        
        @keyframes formRise {
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        
        /* Abyss Search Input */
        #uv-address {
          width: 100%;
          padding: 20px 35px;
          font-size: 1.15rem;
          color: #e0f7fa;
          background: rgba(2, 12, 25, 0.7);
          border: 1px solid rgba(0, 210, 255, 0.15);
          border-radius: 50px;
          outline: none;
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          box-shadow: 
            0 0 0 1px rgba(0, 0, 0, 0.5),
            0 10px 40px rgba(0, 0, 0, 0.6),
            inset 0 0 30px rgba(0, 210, 255, 0.03);
          transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
          text-align: center;
          letter-spacing: 0.08em;
          position: relative;
        }
        
        #uv-address::placeholder {
          color: rgba(224, 247, 250, 0.35);
          transition: all 0.4s ease;
          letter-spacing: 0.1em;
          font-weight: 300;
        }
        
        #uv-address:hover {
          border-color: rgba(0, 210, 255, 0.3);
          box-shadow: 
            0 0 0 1px rgba(0, 0, 0, 0.5),
            0 10px 40px rgba(0, 0, 0, 0.6),
            0 0 20px rgba(0, 210, 255, 0.1),
            inset 0 0 30px rgba(0, 210, 255, 0.05);
        }
        
        #uv-address:focus {
          border-color: rgba(0, 210, 255, 0.5);
          box-shadow: 
            0 0 0 1px rgba(0, 210, 255, 0.2),
            0 15px 50px rgba(0, 0, 0, 0.7),
            0 0 40px rgba(0, 210, 255, 0.15),
            inset 0 0 30px rgba(0, 210, 255, 0.08);
          transform: scale(1.03);
          background: rgba(2, 12, 25, 0.85);
        }
        
        #uv-address:focus::placeholder {
          color: rgba(224, 247, 250, 0.15);
          transform: translateX(10px);
        }
        
        /* Error Display */
        .desc {
          margin-top: 25px;
          text-align: center;
          min-height: 24px;
          animation: formRise 2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
          opacity: 0;
          transform: translateY(40px);
        }
        
        #uv-error, #uv-error-code {
          color: #ff6b6b;
          font-size: 0.9rem;
          text-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
          font-family: 'Courier New', monospace;
          letter-spacing: 0.05em;
        }
        
        /* Footer - Preserved but minimal */
        #footer {
          position: fixed;
          bottom: 0;
          left: 0;
          width: 100%;
          text-align: center;
          padding: 15px;
          z-index: 10;
          pointer-events: none;
        }
      </style>
   </head>
   <body>
      <div id="particles-js"></div>
      <div id="imgsearch">
         
         <title>AbyssV5</title>
         <h1>Abyss V5</h1>
         <form id="uv-form">
            <input id="uv-search-engine" value="https://www.startpage.com/search?q=a " type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Deep Search or type an URL" class="form__input"/>
          </form>
          <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
          </div>
        </div>
      <script src="uv/uv.bundle.js" defer></script>
      <script src="uv/uv.config.js" defer></script>
      <script src="register-sw.js" defer></script>
      <script src="error.js" defer></script>
      <script src="search.js" defer></script>
      <script src="index.js" defer></script>
      <script src="particles.min.js"></script>
      <script src="particles.js"></script>
      
      <script>
      (function() {
        function initAbyssParticles() {
          var container = document.getElementById('particles-js');
          if (!container) return;
          
          // Clean existing canvas to prevent overlap
          var oldCanvas = container.querySelector('canvas');
          if (oldCanvas) oldCanvas.remove();
          
          // Destroy previous instances
          if (window.pJSDom && window.pJSDom.length > 0) {
            window.pJSDom.forEach(function(instance) {
              if (instance && instance.pJS && instance.pJS.fn && instance.pJS.fn.vendors) {
                instance.pJS.fn.vendors.destroypJS();
              }
            });
            window.pJSDom = [];
          }
          
          if (typeof particlesJS !== 'function') return;
          
          // ABYSS PARTICLE SYSTEM
          particlesJS('particles-js', {
            particles: {
              number: {
                value: 100,
                density: { enable: true, value_area: 900 }
              },
              color: {
                value: ["#00d2ff", "#3a7bd5", "#e0f7fa", "#9d4edd", "#72efdd"]
              },
              shape: {
                type: "circle",
                stroke: { width: 0, color: "#000000" }
              },
              opacity: {
                value: 0.5,
                random: true,
                anim: {
                  enable: true,
                  speed: 0.5,
                  opacity_min: 0.05,
                  sync: false
                }
              },
              size: {
                value: 2.5,
                random: true,
                anim: {
                  enable: true,
                  speed: 1.5,
                  size_min: 0.1,
                  sync: false
                }
              },
              line_linked: {
                enable: true,
                distance: 140,
                color: "#00d2ff",
                opacity: 0.06,
                width: 1
              },
              move: {
                enable: true,
                speed: 0.5,
                direction: "top",
                random: true,
                straight: false,
                out_mode: "out",
                bounce: false,
                attract: {
                  enable: false,
                  rotateX: 600,
                  rotateY: 1200
                }
              }
            },
            interactivity: {
              detect_on: "canvas",
              events: {
                onhover: {
                  enable: true,
                  mode: "bubble"
                },
                onclick: {
                  enable: true,
                  mode: "push"
                },
                resize: true
              },
              modes: {
                bubble: {
                  distance: 250,
                  size: 6,
                  duration: 2,
                  opacity: 0.9,
                  speed: 3
                },
                push: {
                  particles_nb: 4
                }
              }
            },
            retina_detect: true
          });
        }
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initAbyssParticles);
        } else {
          setTimeout(initAbyssParticles, 50);
        }
      })();
      </script>
      
      <div id="footer">
      </div>
   </body>
</html>
