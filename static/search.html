<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Abyss - Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -4px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .search-container {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 14px 28px;
            border-radius: 30px;
            background: #202124;
            border: 1px solid #3c4043;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        .search-bar:hover {
            background: #303134;
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
        }

        .search-bar:focus {
            background: #303134;
            box-shadow: 0 1px 8px 1px rgba(0,0,0,0.3);
        }

        .hint {
            margin-top: 24px;
            color: #9aa0a6;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="logo">ABYSS</div>
    <div class="search-container">
        <form id="search-form">
            <input type="text" class="search-bar" id="search-input" placeholder="検索またはURLを入力" autofocus autocomplete="off">
        </form>
    </div>
    <div class="hint">Secure Proxy Architecture v5.2</div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const form = document.getElementById('search-form');
        const input = document.getElementById('search-input');

        // 親(index.html)から呼び出される検索処理
        window.processSearch = function(q) {
            const url = __uv$config.prefix + __uv$config.encodeUrl(
                q.includes('.') ? (q.startsWith('http') ? q : 'https://' + q) : 'https://www.google.com/search?q=' + encodeURIComponent(q)
            );
            location.href = url;
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            const q = input.value;
            if(!q) return;
            
            // 親にローディング表示を依頼（iframe内から親の関数を呼ぶ）
            if(window.parent.showLoader) window.parent.showLoader();
            
            processSearch(q);
        };
    </script>
</body>
</html>
