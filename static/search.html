<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://arc.io/widget.min.js#L1SfLEWE"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VHVNHMYGN3"></script>
  <script src="http://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="./particles.css">
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VHVNHMYGN3');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  <link rel="stylesheet" href="index.css">
  <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>

  <title>Abyss Incognito</title>
  
  <script>
    (function() {
      const banText = "Welcome to Evasi the internet Bypasser, search something up on google or stick around for future updates!";
      
      const originalAlert = window.alert;
      window.alert = function(message) {
        if (typeof message === 'string' && message.includes("Welcome to Evasi")) return;
        originalAlert(message);
      };
      
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeType === 1) { // 要素ノードの場合
              if (node.textContent.includes("Welcome to Evasi")) {
                node.style.display = 'none'; // 即座に非表示
                node.remove(); // DOMから完全に消去
              }
            }
          });
        });
      });

      // ページ全体の監視を開始
      observer.observe(document.documentElement, { childList: true, subtree: true });

      // 3. 念のため読み込み完了時にも全体スキャンして削除
      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('*').forEach(el => {
          if (el.textContent.includes("Welcome to Evasi")) {
            el.style.display = 'none';
            el.remove();
          }
        });
      });
    })();
  </script>

  <style>
    /* リセットと基本設定 */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* シークレットモードの配色 */
      --bg-color: #202124;
      --surface-color: #303134;
      --border-color: #5f6368;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --accent-color: #8ab4f8;
      --focus-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      /* 元の使いにくい独自カーソルを強制解除し、デフォルトに戻す */
      cursor: auto !important; 
    }

    /* 過去の鬱陶しい装飾要素を全て不可視化（JSエラーを防ぐためDOMには残しつつ隠す） */
    #cursor, #cursor-ring, #particles-js, .orb, .grid-bg {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* メインレイアウト */
    #imgsearch {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    /* シークレット風アイコンとタイトル */
    .incognito-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
    }

    .incognito-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      fill: var(--text-primary);
      opacity: 0.8;
    }

    #imgsearch h1 {
      font-size: 2.5rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-primary);
      margin: 0;
    }

    /* 検索フォームのスタイリング */
    #uv-form {
      width: 100%;
      max-width: 584px;
      position: relative;
    }

    /* 検索アイコン */
    .search-icon-input {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    /* 検索入力欄 */
    #uv-address {
      width: 100%;
      height: 48px;
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 0 20px 0 48px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: all 0.2s ease;
    }

    #uv-address::placeholder {
      color: var(--text-secondary);
    }

    #uv-address:hover {
      background-color: #35363a;
      border-color: #5f6368;
    }

    #uv-address:focus {
      background-color: var(--surface-color);
      border-color: var(--surface-color);
      box-shadow: var(--focus-shadow);
    }

    /* エラー表示エリア */
    .desc {
      width: 100%;
      max-width: 584px;
      margin-top: 16px;
      text-align: center;
    }

    #uv-error {
      color: #f28b82; /* エラー用の落ち着いた赤 */
      font-size: 14px;
      margin-bottom: 4px;
    }

    #uv-error-code {
      color: var(--text-secondary);
      font-size: 12px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    /* フッター */
    #footer {
      position: absolute;
      bottom: 20px;
      color: var(--text-secondary);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>
  <div id="particles-js"></div>

  <div id="imgsearch">
    
    <div class="incognito-header">
      <svg class="incognito-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
      <h1>Abyss</h1>
    </div>

    <form id="uv-form">
      <input id="uv-search-engine" value="https://www.startpage.com/search?q=a" type="hidden"/>
      
      <svg class="search-icon-input" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
      
      <input id="uv-address" type="text" placeholder="Search the web securely..." autocomplete="off" spellcheck="false"/>
    </form>

    <div class="desc">
      <p id="uv-error"></p>
      <pre id="uv-error-code"></pre>
    </div>
  </div>

  <div id="footer">
    <p>&copy; 2026 MINO&amp;EVASI.</p>
  </div>

  <script src="uv/uv.bundle.js" defer></script>
  <script src="uv/uv.config.js" defer></script>
  <script src="register-sw.js" defer></script>
  <script src="error.js" defer></script>
  <script src="search.js" defer></script>
  <script src="index.js" defer></script>
  <script src="particles.min.js"></script>
  <script src="particles.js"></script>

  <script>
    const cur  = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    (function animateCursor() {
      rx += (mx - rx) * 0.14;
      ry += (my - ry) * 0.14;
      cur.style.left  = mx + 'px';
      cur.style.top   = my + 'px';
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateCursor);
    })();

    document.querySelectorAll('input, a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cur.style.width = '6px'; cur.style.height = '6px';
        ring.style.width = '52px'; ring.style.height = '52px';
        ring.style.borderColor = 'var(--accent)';
      });
      el.addEventListener('mouseleave', () => {
        cur.style.width = '12px'; cur.style.height = '12px';
        ring.style.width = '36px'; ring.style.height = '36px';
        ring.style.borderColor = 'var(--dim)';
      });
    });

    window.addEventListener('load', function () {
      if (typeof particlesJS !== 'undefined') {
        particlesJS('particles-js', {
          particles: {
            number: { value: 55, density: { enable: true, value_area: 900 } },
            color:  { value: ['#00c8ff', '#0057ff', '#7000ff'] },
            shape:  { type: 'circle' },
            opacity: { value: 0.35, random: true, anim: { enable: true, speed: 0.5, opacity_min: 0.05, sync: false } },
            size:    { value: 1.8, random: true, anim: { enable: true, speed: 1.2, size_min: 0.3, sync: false } },
            line_linked: { enable: true, distance: 130, color: '#0057ff', opacity: 0.1, width: 0.8 },
            move: { enable: true, speed: 0.6, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
          },
          interactivity: {
            detect_on: 'canvas',
            events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' }, resize: true },
            modes: { grab: { distance: 180, line_linked: { opacity: 0.35 } }, push: { particles_nb: 3 } }
          },
          retina_detect: true
        });
      }
    });
  </script>
</body>
</html>
