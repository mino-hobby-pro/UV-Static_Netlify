  <style>
    /* ─── POPUP BLOCKER — blocks "Welcome to Evasi" and any alert/confirm/prompt ─── */
    /* Applied before DOM ready via CSS visibility trick + JS override below          */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Incognito palette: pure dark, frosted white accents, zero color noise */
      --bg:           #0d0d0f;
      --surface:      #141416;
      --glass:        rgba(255,255,255,0.04);
      --glass-hi:     rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.08);
      --border-hi:    rgba(255,255,255,0.18);
      --accent:       #c8d6e5;      /* cool silver-white */
      --accent2:      #8899aa;      /* muted slate */
      --accent-glow:  rgba(200,214,229,0.15);
      --text:         rgba(255,255,255,0.88);
      --text-dim:     rgba(255,255,255,0.38);
      --text-ghost:   rgba(255,255,255,0.14);
      --incognito:    rgba(255,255,255,0.06);
      --hat-fill:     rgba(255,255,255,0.82);
      --radius:       14px;
      --radius-sm:    8px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── CUSTOM CURSOR ─────────────────────────────────────────── */
    #cursor {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      transform: translate(-50%, -50%);
      transition: width 0.18s ease, height 0.18s ease, opacity 0.2s;
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed; z-index: 9998; pointer-events: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      transform: translate(-50%, -50%);
      transition: transform 0.22s cubic-bezier(0.23,1,0.32,1),
                  width 0.22s ease, height 0.22s ease,
                  border-color 0.2s;
      mix-blend-mode: difference;
    }
    #cursor.hover { width: 4px; height: 4px; }
    #cursor-ring.hover { width: 48px; height: 48px; border-color: rgba(255,255,255,0.5); }

    /* ─── FULL-PAGE VIGNETTE ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(
        ellipse 75% 70% at 50% 42%,
        transparent 0%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* Subtle grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.028'/%3E%3C/svg%3E");
      background-size: 220px;
      opacity: 0.7;
    }

    /* ─── PARTICLES CANVAS ───────────────────────────────────────── */
    #particles-js {
      position: fixed; inset: 0; z-index: 0;
    }

    /* ─── BACKGROUND: subtle radial spotlight ────────────────────── */
    .bg-spotlight {
      position: fixed; z-index: 0; pointer-events: none;
      width: 900px; height: 900px;
      left: 50%; top: 42%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,255,255,0.022) 0%, transparent 65%);
      border-radius: 50%;
      animation: pulse-glow 8s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.06); }
    }

    /* Diagonal blurred line accents (incognito feel) */
    .bg-line {
      position: fixed; z-index: 0; pointer-events: none;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.04), transparent);
      height: 100%;
      top: 0;
    }
    .bg-line:nth-child(1) { left: 22%; animation: line-fade 12s ease-in-out infinite; }
    .bg-line:nth-child(2) { left: 78%; animation: line-fade 12s ease-in-out infinite 4s; }
    @keyframes line-fade {
      0%,100% { opacity: 0.3; }
      50%      { opacity: 0.8; }
    }

    /* ─── MAIN LAYOUT ─────────────────────────────────────────────── */
    #imgsearch {
      position: relative; z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 0;
    }

    /* ─── INCOGNITO ICON ─────────────────────────────────────────── */
    .incognito-icon {
      width: 72px; height: 72px;
      margin-bottom: 2.2rem;
      animation: icon-in 1s cubic-bezier(0.16,1,0.3,1) both;
      opacity: 0.75;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.12));
      transition: opacity 0.3s, filter 0.3s;
    }
    .incognito-icon:hover {
      opacity: 1;
      filter: drop-shadow(0 0 28px rgba(255,255,255,0.22));
    }
    @keyframes icon-in {
      from { opacity: 0; transform: translateY(-16px) scale(0.88); }
      to   { opacity: 0.75; transform: translateY(0) scale(1); }
    }

    /* ─── WORDMARK ──────────────────────────────────────────────── */
    #imgsearch h1 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 7vw, 5.5rem);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.5rem;
      color: transparent;
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.42) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      position: relative;
      animation: title-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    /* Subtle glitch - barely perceptible, very incognito */
    #imgsearch h1::before {
      content: 'Abyss V5';
      position: absolute; inset: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glitch-subtle 9s infinite;
      clip-path: polygon(0 30%, 100% 30%, 100% 55%, 0 55%);
      filter: hue-rotate(200deg) brightness(1.3);
      opacity: 0;
    }
    #imgsearch h1::after {
      content: 'Abyss V5';
      position: absolute; inset: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glitch-subtle 9s infinite 0.12s;
      clip-path: polygon(0 62%, 100% 62%, 100% 78%, 0 78%);
      filter: hue-rotate(-180deg);
      opacity: 0;
    }
    @keyframes glitch-subtle {
      0%,88%,100% { transform: translate(0); opacity: 0; }
      90% { transform: translate(-3px, 0); opacity: 0.45; }
      92% { transform: translate(2px, 0);  opacity: 0.3; }
      94% { transform: translate(0);       opacity: 0; }
    }

    /* Status line */
    .status-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 3.6rem;
      animation: badge-in 1.2s cubic-bezier(0.16,1,0.3,1) 0.25s both;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: dot-pulse 3s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.9; transform: scale(1.3); }
    }
    .status-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ─── SEARCH FORM ─────────────────────────────────────────────── */
    #uv-form {
      position: relative;
      width: min(660px, 90vw);
      animation: form-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    /* Frosted glass card behind input */
    #uv-form::after {
      content: '';
      position: absolute;
      inset: -20px -24px;
      background: rgba(255,255,255,0.018);
      border-radius: 20px;
      backdrop-filter: blur(2px);
      z-index: -1;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    /* Animated top border line */
    #uv-form::before {
      content: '';
      position: absolute;
      top: -1px; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,255,255,0.35) 30%,
        rgba(255,255,255,0.55) 50%,
        rgba(255,255,255,0.35) 70%,
        transparent
      );
      border-radius: 1px;
      animation: top-line-glow 4s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes top-line-glow {
      0%,100% { opacity: 0.5; left: 20%; right: 20%; }
      50%      { opacity: 1;   left: 10%; right: 10%; }
    }

    #uv-address {
      width: 100%;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(32px) saturate(140%);
      -webkit-backdrop-filter: blur(32px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 1.25rem 1.6rem 1.25rem 3.8rem;
      color: rgba(255,255,255,0.9);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.98rem;
      font-weight: 400;
      letter-spacing: 0.015em;
      outline: none;
      caret-color: rgba(255,255,255,0.7);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    #uv-address::placeholder {
      color: rgba(255,255,255,0.22);
      font-weight: 300;
      font-style: italic;
    }
    #uv-address:focus {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.22);
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.04),
        0 8px 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Search icon */
    #uv-form .search-icon {
      position: absolute;
      left: 1.2rem; top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px;
      opacity: 0.3;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #uv-form:focus-within .search-icon { opacity: 0.7; }

    /* ─── ERROR AREA ─────────────────────────────────────────────── */
    .desc {
      margin-top: 1.1rem;
      width: min(660px, 90vw);
      animation: form-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
    }
    .left-margin { padding-left: 0.2rem; }
    #uv-error {
      color: rgba(255, 120, 120, 0.75);
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      min-height: 1.2em;
      font-family: 'DM Mono', monospace;
    }
    #uv-error-code {
      color: var(--text-ghost);
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      margin-top: 0.3rem;
      white-space: pre-wrap;
    }

    /* ─── HINT ROW (privacy, speed) ─────────────────────────────── */
    .hint-row {
      display: flex;
      gap: 2.4rem;
      margin-top: 3rem;
      animation: badge-in 1.3s cubic-bezier(0.16,1,0.3,1) 0.7s both;
      opacity: 0.42;
      transition: opacity 0.3s;
    }
    .hint-row:hover { opacity: 0.7; }
    .hint-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .hint-item svg { opacity: 0.7; flex-shrink: 0; }

    /* ─── FOOTER ─────────────────────────────────────────────────── */
    #footer {
      position: fixed;
      bottom: 1.6rem; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.62rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.1);
      white-space: nowrap;
      animation: footer-in 2s ease 1.3s both;
    }
    #footer p { display: none; }

    @keyframes footer-in {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ─── ENTRY ANIMATIONS ───────────────────────────────────────── */
    @keyframes title-in {
      from { opacity: 0; transform: translateY(28px); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    @keyframes badge-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes form-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes icon-in {
      from { opacity: 0; transform: translateY(-16px) scale(0.88); }
      to   { opacity: 0.75; transform: translateY(0) scale(1); }
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 520px) {
      #imgsearch h1 { letter-spacing: 0.18em; }
      #uv-address   { padding: 1.05rem 1.2rem 1.05rem 3.2rem; font-size: 0.88rem; }
      .hint-row     { gap: 1.4rem; }
      .incognito-icon { width: 56px; height: 56px; }
    }
  </style>
</head>

  <script>
    /* ══════════════════════════════════════════════════════════════════
       POPUP BLOCKER — 完全ブロック
       "Welcome to Evasi the internet Bypasser…" を含む
       あらゆる手段のポップアップ・アラート・確認ダイアログを永久封印
    ══════════════════════════════════════════════════════════════════ */
    (function blockAllPopups() {
      var BLOCKED_STRING = 'Welcome to Evasi';

      /* --- ネイティブダイアログを封印 --------------------------------- */
      var _noop = function() { return ''; };
      var _block = function(original) {
        return function(msg) {
          if (typeof msg === 'string' && msg.indexOf(BLOCKED_STRING) !== -1) return;
          // 他のalert/confirmも封印したい場合はreturnのみ、許可したい場合は以下を有効化
          // return original.call(window, msg);
          return;
        };
      };
      window.alert   = _block(window.alert);
      window.confirm = function() { return false; };
      window.prompt  = function() { return null; };

      /* --- MutationObserver: DOM注入ポップアップをブロック ------------ */
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) {
              var text = node.textContent || '';
              if (text.indexOf(BLOCKED_STRING) !== -1) {
                node.parentNode && node.parentNode.removeChild(node);
                return;
              }
              // 子孫も確認
              var found = node.querySelectorAll && node.querySelectorAll('*');
              if (found) {
                Array.prototype.forEach.call(found, function(child) {
                  if ((child.textContent || '').indexOf(BLOCKED_STRING) !== -1) {
                    child.parentNode && child.parentNode.removeChild(child);
                  }
                });
              }
            }
          });
        });
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });

      /* --- beforeunload / unload でポップアップを阻止 ---------------- */
      window.addEventListener('beforeunload', function(e) {
        e.stopImmediatePropagation();
      }, true);

      /* --- postMessage経由ポップアップブロック ----------------------- */
      window.addEventListener('message', function(e) {
        if (e.data && typeof e.data === 'string' && e.data.indexOf(BLOCKED_STRING) !== -1) {
          e.stopImmediatePropagation();
        }
      }, true);

      /* --- setTimeout/setInterval内のdynamic alert を封印 ----------- */
      var _origSetTimeout = window.setTimeout;
      var _origSetInterval = window.setInterval;
      window.setTimeout = function(fn, delay) {
        var args = Array.prototype.slice.call(arguments);
        if (typeof fn === 'string' && fn.indexOf(BLOCKED_STRING) !== -1) return;
        return _origSetTimeout.apply(window, args);
      };
      window.setInterval = function(fn, delay) {
        var args = Array.prototype.slice.call(arguments);
        if (typeof fn === 'string' && fn.indexOf(BLOCKED_STRING) !== -1) return;
        return _origSetInterval.apply(window, args);
      };
    })();

    /* ══════════════════════════════════════════════════════════════════
       CUSTOM CURSOR
    ══════════════════════════════════════════════════════════════════ */
    var cur  = document.getElementById('cursor');
    var ring = document.getElementById('cursor-ring');
    var mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });

    (function animateCursor() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      cur.style.left  = mx + 'px';
      cur.style.top   = my + 'px';
      ring.style.left = Math.round(rx) + 'px';
      ring.style.top  = Math.round(ry) + 'px';
      requestAnimationFrame(animateCursor);
    })();

    document.querySelectorAll('input, a, button, .hint-item').forEach(function(el) {
      el.addEventListener('mouseenter', function() {
        cur.classList.add('hover');
        ring.classList.add('hover');
      });
      el.addEventListener('mouseleave', function() {
        cur.classList.remove('hover');
        ring.classList.remove('hover');
      });
    });

    /* ══════════════════════════════════════════════════════════════════
       PARTICLES.JS — monochrome incognito style
    ══════════════════════════════════════════════════════════════════ */
    window.addEventListener('load', function () {
      if (typeof particlesJS !== 'undefined') {
        particlesJS('particles-js', {
          particles: {
            number: { value: 40, density: { enable: true, value_area: 1000 } },
            color:  { value: ['#ffffff', '#c8d6e5', '#8899aa'] },
            shape:  { type: 'circle' },
            opacity: {
              value: 0.18,
              random: true,
              anim: { enable: true, speed: 0.4, opacity_min: 0.02, sync: false }
            },
            size: {
              value: 1.4,
              random: true,
              anim: { enable: true, speed: 0.8, size_min: 0.2, sync: false }
            },
            line_linked: {
              enable: true, distance: 150,
              color: '#ffffff', opacity: 0.04, width: 0.6
            },
            move: {
              enable: true, speed: 0.35, direction: 'none',
              random: true, straight: false, out_mode: 'out', bounce: false
            }
          },
          interactivity: {
            detect_on: 'canvas',
            events: {
              onhover: { enable: true, mode: 'grab' },
              onclick: { enable: false },
              resize:  true
            },
            modes: {
              grab: { distance: 160, line_linked: { opacity: 0.22 } }
            }
          },
          retina_detect: true
        });
      }
    });
  </script>
</body>
</html>
